<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Now - Artisan Kitchen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0f0f0f;
            --secondary-dark: #1a1a1a;
            --accent-red: #d32f2f;
            --accent-green: #2e7d32;
            --text-light: #f5f5f5;
            --text-muted: #b0b0b0;
            --border-color: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--primary-dark);
            color: var(--text-light);
            line-height: 1.6;
        }

        /* ─── HEADER / NAV ─────────────────────────────────────────── */
        header {
            background: var(--secondary-dark);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-red);
            letter-spacing: 1px;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--accent-red);
        }

        .back-link {
            background: var(--accent-red);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .back-link:hover {
            background: #b71c1c;
        }

        /* ─── MAIN LAYOUT ─────────────────────────────────────────── */
        .order-container {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            min-height: calc(100vh - 100px);
        }

        /* ─── LEFT SIDE: MENU ─────────────────────────────────────────── */
        .menu-area {
            display: flex;
            flex-direction: column;
        }

        .menu-header {
            margin-bottom: 2rem;
        }

        .menu-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .order-type-badge {
            display: inline-block;
            background: var(--accent-green);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        /* Category Navigation */
        .category-nav {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .category-btn {
            background: var(--primary-dark);
            color: var(--text-light);
            border: 2px solid var(--border-color);
            padding: 0.7rem 1.3rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--accent-red);
            border-color: var(--accent-red);
            color: white;
        }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
            flex: 1;
        }

        .menu-item-card {
            background: var(--secondary-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .menu-item-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-green));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .menu-item-card:hover {
            border-color: var(--accent-green);
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 12px 30px rgba(46, 125, 50, 0.2);
        }

        .menu-item-card:hover::before {
            transform: scaleX(1);
        }

        .menu-item-card h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
            color: var(--accent-green);
        }

        .menu-item-card p {
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        .add-btn {
            background: var(--accent-red);
            color: white;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: background 0.3s ease;
            align-self: flex-start;
        }

        .add-btn:hover {
            background: #b71c1c;
        }

        /* ─── RIGHT SIDE: CART SIDEBAR ─────────────────────────────────────────── */
        .cart-sidebar {
            background: var(--secondary-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 100px;
            display: flex;
            flex-direction: column;
        }

        .cart-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }

        .cart-header h2 {
            font-size: 1.4rem;
            color: var(--accent-red);
            margin-bottom: 0.3rem;
        }

        .cart-header p {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 1.5rem;
            max-height: 400px;
        }

        .cart-empty {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem 1rem;
            font-size: 0.9rem;
        }

        .cart-item {
            background: var(--primary-dark);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .cart-item-info h4 {
            color: var(--accent-green);
            margin-bottom: 0.3rem;
            font-size: 0.95rem;
        }

        .cart-item-info p {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .cart-item-qty {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-top: 0.5rem;
        }

        .qty-btn {
            background: var(--accent-red);
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.3s ease;
        }

        .qty-btn:hover {
            background: #b71c1c;
        }

        .qty-display {
            color: var(--text-light);
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }

        .remove-btn {
            background: transparent;
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
            padding: 0.3rem 0.6rem;
            border-radius: 2px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s ease;
        }

        .remove-btn:hover {
            background: var(--accent-red);
            color: white;
        }

        /* Cart Totals */
        .cart-totals {
            background: var(--primary-dark);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.6rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .total-row.final {
            border-top: 1px solid var(--border-color);
            padding-top: 0.6rem;
            margin-top: 0.6rem;
            color: var(--accent-green);
            font-weight: 700;
            font-size: 1.1rem;
        }

        /* Checkout Button */
        .checkout-btn {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 100%;
        }

        .checkout-btn:hover:not(:disabled) {
            background: #1e5a1f;
        }

        .checkout-btn:disabled {
            background: var(--border-color);
            cursor: not-allowed;
            opacity: 0.5;
        }

        /* ─── RESPONSIVE ─────────────────────────────────────────── */
        @media (max-width: 1024px) {
            .order-container {
                grid-template-columns: 1fr;
            }

            .cart-sidebar {
                position: relative;
                top: 0;
                height: auto;
            }

            .menu-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .order-container {
                padding: 1rem;
                gap: 1rem;
            }

            .menu-header h1 {
                font-size: 1.5rem;
            }

            .category-nav {
                gap: 0.5rem;
            }

            .category-btn {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }

            .menu-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 1rem;
            }

            .menu-item-card {
                padding: 1rem;
            }

            .menu-item-card h3 {
                font-size: 1rem;
            }

            .menu-item-card p {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

                { name: 'Order of Boneless Wings - Ranchero', price: 11.99 },
                { name: 'Order of Boneless Wings - Dry Cajun', price: 11.99 }
            ]
        };

        let cart = [];
        let currentCategory = 'appetizers';
        let orderType = 'Pickup';

        // Initialize page
        function init() {
            // Load order type from localStorage
            const savedOrderType = localStorage.getItem('orderType');
            orderType = savedOrderType === 'delivery' ? 'Delivery' : 'Pickup';
            document.getElementById('orderTypeBadge').textContent = `${orderType} Order`;

            // Generate category buttons
            generateCategoryNav();

            // Render initial menu
            renderMenu('appetizers');
        }

        function generateCategoryNav() {
            const nav = document.getElementById('categoryNav');
            const categories = [
                { id: 'appetizers', label: '🍽️ Appetizers' },
                { id: 'salads', label: '🥗 Salads' },
                { id: 'sandwiches', label: '🥪 Sandwiches' },
                { id: 'dinners', label: '🍽️ Dinners' },
                { id: 'pasta', label: '🍝 Pasta' },
                { id: 'children', label: '🧒 Children\'s' },
                { id: 'potato', label: '🍟 Potato Patch' },
                { id: 'wings', label: '🍗 Wings' }
            ];

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${cat.id === 'appetizers' ? 'active' : ''}`;
                btn.textContent = cat.label;
                btn.onclick = () => filterMenu(cat.id);
                nav.appendChild(btn);
            });
        }

        function filterMenu(category) {
            currentCategory = category;

            // Update active button
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Render menu
            renderMenu(category);
        }

        function renderMenu(category) {
            const menuGrid = document.getElementById('menuGrid');
            menuGrid.innerHTML = '';

            const items = menuData[category] || [];
            items.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'menu-item-card';
                itemDiv.style.animationDelay = `${index * 0.05}s`;

                itemDiv.innerHTML = `
                    <h3>${item.name}</h3>
                    <p>Premium quality item prepared fresh daily</p>
                    <div style="display: flex; gap: 0.5rem; align-items: center; justify-content: space-between;">
                        <span style="color: var(--accent-green); font-weight: 600;">$${item.price.toFixed(2)}</span>
                        <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">Add</button>
                    </div>
                `;

                menuGrid.appendChild(itemDiv);
            });
        }

        function addToCart(itemName, price) {
            // Check if item already in cart
            const existingItem = cart.find(item => item.name === itemName);

            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ name: itemName, price, quantity: 1 });
            }

            updateCartUI();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function updateQuantity(index, change) {
            cart[index].quantity += change;
            if (cart[index].quantity <= 0) {
                removeFromCart(index);
            } else {
                updateCartUI();
            }
        }

        function updateCartUI() {
            const cartItems = document.getElementById('cartItems');
            const cartTotals = document.getElementById('cartTotals');
            const checkoutBtn = document.getElementById('checkoutBtn');
            const cartItemCount = document.getElementById('cartItemCount');

            if (cart.length === 0) {
                cartItems.innerHTML = '<div class="cart-empty">Your cart is empty</div>';
                cartTotals.style.display = 'none';
                checkoutBtn.disabled = true;
                cartItemCount.textContent = '0 items';
                return;
            }

            cartTotals.style.display = 'block';
            checkoutBtn.disabled = false;
            cartItemCount.textContent = `${cart.length} item${cart.length !== 1 ? 's' : ''}`;

            cartItems.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <h4>${item.name}</h4>
                        <p>$${item.price.toFixed(2)} each</p>
                        <div class="cart-item-qty">
                            <button class="qty-btn" onclick="updateQuantity(${index}, -1)">−</button>
                            <span class="qty-display">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                            <button class="remove-btn" onclick="removeFromCart(${index})">Remove</button>
                        </div>
                    </div>
                </div>
            `).join('');

            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const tax = subtotal * 0.08;
            const total = subtotal + tax;

            document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
            document.getElementById('tax').textContent = `$${tax.toFixed(2)}`;
            document.getElementById('total').textContent = `$${total.toFixed(2)}`;
        }

        function checkout() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0) * 1.08;
            alert(`Order Type: ${orderType}\nTotal: $${total.toFixed(2)}\n\nRedirecting to checkout...`);
            // This will connect to Square API later
        }

        // Initialize on page load
        init();
    </script>
</body>
</html>
